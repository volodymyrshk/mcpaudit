name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Type check
        run: bun run typecheck
        working-directory: packages/cli

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build
        working-directory: packages/cli

      - name: Compile binary
        run: bun build src/index.ts --compile --outfile agentaudit
        working-directory: packages/cli

      - name: Verify binary
        run: ./packages/cli/agentaudit --version

  self-scan:
    name: Self-Scan (Dogfood)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Scan MCP Filesystem Server
        run: |
          bun run packages/cli/src/index.ts scan \
            --server "npx -y @modelcontextprotocol/server-filesystem /tmp" \
            --ci --accept \
            -o results/filesystem.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results/filesystem.sarif
          category: agentaudit-filesystem
